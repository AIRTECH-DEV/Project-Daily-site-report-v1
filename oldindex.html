<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root {
      --brand-red: #c82027;
      --brand-red-dark: #8f1419;
      --brand-yellow: #f6b500;
      --brand-yellow-soft: #fff5d8;
      --ink: #2f271f;
      --text: #3c3935;
      --muted: #77706a;
      --line: #e7dfd7;
      --surface: #ffffff;
      --soft: #faf7f2;
      --shadow: 0 24px 60px rgba(80, 50, 28, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background:
        linear-gradient(135deg, rgba(248, 181, 0, 0.12), rgba(255, 255, 255, 0) 36%),
        linear-gradient(315deg, rgba(200, 32, 39, 0.09), rgba(255, 255, 255, 0) 42%),
        #fffdf9;
      color: var(--text);
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    .app {
      width: 100%;
      min-height: 100vh;
      min-height: 100svh;
      display: grid;
      grid-template-columns: minmax(320px, 38vw) minmax(0, 1fr);
      overflow: hidden;
    }

    .brand-panel {
      position: relative;
      min-height: 100vh;
      min-height: 100svh;
      padding: clamp(28px, 4vw, 58px);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 34px;
      color: #fff;
      overflow: hidden;
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.95) 0 30%, transparent 30%),
        linear-gradient(146deg, transparent 0 42%, rgba(246, 181, 0, 0.95) 42% 58%, transparent 58%),
        linear-gradient(146deg, transparent 0 55%, rgba(200, 32, 39, 0.98) 55% 100%),
        #7d1518;
    }

    .brand-panel::before,
    .brand-panel::after {
      content: "";
      position: absolute;
      inset: auto auto -16% -8%;
      width: 70%;
      height: 38%;
      transform: rotate(-18deg);
      background: rgba(255, 255, 255, 0.12);
      pointer-events: none;
    }

    .brand-panel::after {
      inset: 8% -18% auto auto;
      width: 64%;
      height: 28%;
      background: rgba(255, 255, 255, 0.16);
    }

    .brand-lockup,
    .brand-footer {
      position: relative;
      z-index: 1;
    }

    .logo-frame {
      width: min(100%, 430px);
      padding: clamp(14px, 2vw, 22px);
      border: 1px solid rgba(255, 255, 255, 0.72);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.94);
      box-shadow: var(--shadow);
    }

    .brand-logo {
      display: block;
      width: 100%;
      height: auto;
    }

    .eyebrow {
      margin: 34px 0 10px;
      color: rgba(255, 255, 255, 0.82);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .brand-panel h1 {
      margin: 0;
      max-width: 12ch;
      color: #fff;
      font-size: clamp(42px, 5vw, 74px);
      line-height: 0.94;
      font-weight: 850;
      letter-spacing: 0;
    }

    .brand-footer {
      display: grid;
      gap: 12px;
      max-width: 390px;
    }

    .brand-footer span {
      width: fit-content;
      padding: 8px 12px;
      border: 1px solid rgba(255, 255, 255, 0.38);
      border-radius: 999px;
      background: rgba(47, 39, 31, 0.28);
      color: rgba(255, 255, 255, 0.94);
      font-size: 13px;
      font-weight: 700;
    }

    .workflow {
      min-width: 0;
      min-height: 100vh;
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      background: rgba(255, 255, 255, 0.86);
      backdrop-filter: blur(12px);
    }

    .topbar {
      padding: clamp(20px, 3vw, 34px) clamp(20px, 5vw, 72px) 18px;
      border-bottom: 1px solid rgba(231, 223, 215, 0.85);
      background: rgba(255, 255, 255, 0.82);
    }

    .mobile-brand {
      display: none;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }

    .mobile-brand img {
      width: 116px;
      height: auto;
      display: block;
    }

    .mobile-brand strong {
      display: block;
      color: var(--ink);
      font-size: 14px;
      line-height: 1.2;
    }

    .mobile-brand span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-top: 2px;
    }

    .meta-row {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 12px;
    }

    .meta-label {
      display: block;
      margin-bottom: 5px;
      color: var(--brand-red-dark);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    #stepLabel {
      display: block;
      color: var(--ink);
      font-size: clamp(17px, 2vw, 22px);
      font-weight: 800;
    }

    .status-chip {
      flex: 0 0 auto;
      min-width: 76px;
      padding: 8px 12px;
      border-radius: 999px;
      background: var(--brand-yellow-soft);
      color: var(--ink);
      font-size: 12px;
      font-weight: 800;
      text-align: center;
    }

    .progress-track {
      height: 8px;
      border-radius: 999px;
      overflow: hidden;
      background: #efe8df;
    }

    .progress-fill {
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--brand-red), var(--brand-yellow));
      box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.24) inset;
      transition: width 0.25s ease;
    }

    .content {
      flex: 1;
      min-height: 0;
      display: flex;
      align-items: center;
      padding: clamp(28px, 5vw, 72px);
      overflow-y: auto;
    }

    .field-panel {
      width: min(100%, 720px);
    }

    .question {
      margin: 0 0 26px;
      color: var(--ink);
      font-size: clamp(28px, 4vw, 48px);
      font-weight: 850;
      line-height: 1.04;
      letter-spacing: 0;
    }

    input[type="text"],
    input[type="number"],
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      color: var(--ink);
      font-size: 17px;
      box-shadow: 0 16px 34px rgba(56, 39, 25, 0.08);
      transition: border-color 0.18s ease, box-shadow 0.18s ease, transform 0.18s ease;
    }

    input[type="text"],
    input[type="number"] {
      min-height: 58px;
      padding: 0 18px;
    }

    textarea {
      min-height: 170px;
      padding: 16px 18px;
      line-height: 1.5;
      resize: vertical;
    }

    input:focus,
    textarea:focus {
      outline: none;
      border-color: var(--brand-red);
      box-shadow: 0 0 0 4px rgba(200, 32, 39, 0.13), 0 18px 38px rgba(56, 39, 25, 0.12);
      transform: translateY(-1px);
    }

    .pill-group {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 14px;
    }

    .yesno-group {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .pill,
    .yesno-btn {
      min-height: 62px;
      padding: 15px 18px;
      border: 1px solid var(--line);
      border-left: 5px solid transparent;
      border-radius: 8px;
      background: var(--surface);
      color: var(--ink);
      font-size: 16px;
      font-weight: 750;
      text-align: left;
      cursor: pointer;
      box-shadow: 0 14px 30px rgba(56, 39, 25, 0.08);
      transition: border-color 0.18s ease, background 0.18s ease, box-shadow 0.18s ease, transform 0.18s ease;
    }

    .yesno-btn {
      text-align: center;
      border-left-width: 1px;
    }

    .pill:hover,
    .yesno-btn:hover {
      border-color: rgba(200, 32, 39, 0.42);
      transform: translateY(-1px);
    }

    .pill.selected,
    .yesno-btn.selected {
      border-color: var(--brand-red);
      border-left-color: var(--brand-red);
      background: linear-gradient(180deg, #fff, #fff7ed);
      color: var(--brand-red-dark);
      box-shadow: 0 18px 42px rgba(200, 32, 39, 0.15);
    }

    .search-wrap {
      position: relative;
    }

    .search-results {
      position: absolute;
      top: calc(100% + 10px);
      left: 0;
      right: 0;
      z-index: 5;
      max-height: 260px;
      overflow-y: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 18px 42px rgba(56, 39, 25, 0.16);
    }

    .search-item {
      display: block;
      width: 100%;
      padding: 13px 16px;
      border: 0;
      border-bottom: 1px solid #f2ede7;
      background: #fff;
      color: var(--ink);
      font-size: 14px;
      line-height: 1.35;
      text-align: left;
      cursor: pointer;
    }

    .search-item:last-child {
      border-bottom: 0;
    }

    .search-item:hover {
      background: var(--brand-yellow-soft);
    }

    .search-empty,
    .search-loading {
      padding: 14px 16px;
      color: var(--muted);
      font-size: 14px;
    }

    .file-drop {
      min-height: 176px;
      display: grid;
      place-items: center;
      padding: 24px;
      border: 2px dashed #d4c7bb;
      border-radius: 8px;
      background:
        linear-gradient(135deg, rgba(246, 181, 0, 0.10), rgba(255, 255, 255, 0) 42%),
        #fff;
      color: var(--muted);
      font-size: 16px;
      font-weight: 750;
      text-align: center;
      cursor: pointer;
      box-shadow: 0 16px 34px rgba(56, 39, 25, 0.08);
      transition: border-color 0.18s ease, color 0.18s ease, background 0.18s ease, transform 0.18s ease;
    }

    .file-drop:hover,
    .file-drop:focus {
      outline: none;
      border-color: var(--brand-red);
      color: var(--brand-red-dark);
      transform: translateY(-1px);
    }

    .file-drop.has-files {
      border-color: var(--brand-red);
      background:
        linear-gradient(135deg, rgba(200, 32, 39, 0.09), rgba(255, 255, 255, 0) 44%),
        #fff8ef;
      color: var(--brand-red-dark);
    }

    .file-list {
      margin-top: 14px;
      display: grid;
      gap: 8px;
    }

    .file-chip {
      min-width: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      font-size: 14px;
      box-shadow: 0 10px 24px rgba(56, 39, 25, 0.07);
    }

    .file-chip span {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .file-remove {
      flex: 0 0 auto;
      border: 0;
      background: transparent;
      color: var(--brand-red-dark);
      font-size: 13px;
      font-weight: 800;
      cursor: pointer;
    }

    .navbar {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      padding: 18px clamp(20px, 5vw, 72px) clamp(20px, 3vw, 32px);
      border-top: 1px solid rgba(231, 223, 215, 0.9);
      background: rgba(255, 255, 255, 0.92);
    }

    .btn {
      min-height: 52px;
      min-width: 130px;
      padding: 0 22px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      font-size: 15px;
      font-weight: 850;
      cursor: pointer;
      transition: opacity 0.18s ease, transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
    }

    .btn:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 14px 28px rgba(56, 39, 25, 0.12);
    }

    .btn:disabled {
      opacity: 0.38;
      cursor: not-allowed;
    }

    .btn-next {
      min-width: 188px;
      border-color: transparent;
      background: linear-gradient(135deg, var(--brand-red), var(--brand-red-dark));
      color: #fff;
      box-shadow: 0 16px 30px rgba(200, 32, 39, 0.22);
    }

    .center-screen {
      min-height: 100vh;
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      text-align: center;
      background:
        linear-gradient(135deg, rgba(246, 181, 0, 0.14), rgba(255, 255, 255, 0) 42%),
        #fffdf9;
    }

    .center-screen h2 {
      margin: 10px 0 8px;
      color: var(--ink);
      font-size: clamp(28px, 4vw, 44px);
      line-height: 1.05;
    }

    .center-screen p {
      max-width: 440px;
      margin: 0 0 24px;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.5;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 4px solid #f3dfdf;
      border-top-color: var(--brand-red);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @media (max-width: 860px) {
      .app {
        display: flex;
        flex-direction: column;
        overflow: visible;
      }

      .brand-panel {
        display: none;
      }

      .workflow {
        min-height: 100vh;
        min-height: 100svh;
      }

      .mobile-brand {
        display: flex;
      }

      .content {
        align-items: flex-start;
        padding: 30px 20px;
      }

      .question {
        font-size: clamp(27px, 9vw, 38px);
      }

      .navbar {
        position: sticky;
        bottom: 0;
        padding: 12px 16px 16px;
      }

      .btn {
        flex: 1;
        min-width: 0;
      }

      .btn-next {
        flex: 1.45;
      }
    }

    @media (max-width: 480px) {
      .topbar {
        padding: 18px 16px 14px;
      }

      .meta-row {
        align-items: flex-start;
      }

      .status-chip {
        min-width: 62px;
        padding: 7px 9px;
      }

      .yesno-group,
      .pill-group {
        grid-template-columns: 1fr;
      }

      textarea {
        min-height: 150px;
      }
    }
  </style>
</head>

  <script>
    const STEPS = [
      { id: 'siteType', title: 'Is this a VRV or Non-VRV site?', type: 'radio', options: ['VRV', 'Non-VRV'] },
      { id: 'project', title: 'Which site is this for?', type: 'search' },
      { id: 'people', title: 'How many people are on site today?', type: 'number' },
      { id: 'engineer', title: 'Project engineer', type: 'radio', options: ['Dada', 'Nagraj', 'Ganesh', 'Vrundavan'] },
      { id: 'activity', title: "Today's activity", type: 'textarea' },
      { id: 'photo', title: 'Upload site photo(s)', type: 'file', multiple: true },
      { id: 'nextPlan', title: 'What is the plan for this site tomorrow?', type: 'text' },
      { id: 'amendment', title: 'Any amendment / PO / approval required?', type: 'yesno' },
      { id: 'amendmentWhy', title: 'If yes - why?', type: 'textarea', showIf: a => a.amendment === 'Yes' },
      { id: 'drawingChange', title: 'Any changes in drawing as per project condition?', type: 'yesno' },
      { id: 'drawingPhoto', title: 'Upload the drawing change photo', type: 'file', showIf: a => a.drawingChange === 'Yes' },
      { id: 'measurement', title: 'Measurement report created today?', type: 'yesno' },
      { id: 'measurementFile', title: 'Upload the measurement report', type: 'file', showIf: a => a.measurement === 'Yes' }
    ];

    let answers = {};
    let currentStepId = STEPS[0].id;
    let projectList = [];
    let projectListLoadedFor = null;
    let projectListLoading = false;
    let submitting = false;

    function escapeHtml(value) {
      return (value === undefined || value === null ? '' : String(value))
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function getVisibleSteps() {
      return STEPS.filter(s => !s.showIf || s.showIf(answers));
    }

    function currentIndex() {
      const vs = getVisibleSteps();
      return vs.findIndex(s => s.id === currentStepId);
    }

    function isValid(step) {
      const v = answers[step.id];
      switch (step.type) {
        case 'search':
        case 'text':
        case 'number':
          return v !== undefined && v.toString().trim() !== '';
        case 'textarea':
          return v !== undefined && v.toString().trim() !== '';
        case 'radio':
        case 'yesno':
          return v !== undefined && v !== '';
        case 'file':
          return step.multiple ? (Array.isArray(v) && v.length > 0) : !!v;
        default:
          return true;
      }
    }

    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result.split(',')[1]);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    function loadProjectList(siteType) {
      projectListLoading = true;
      projectListLoadedFor = null;

      if (!window.google || !google.script || !google.script.run) {
        projectList = [];
        projectListLoadedFor = siteType;
        projectListLoading = false;
        if (currentStepId === 'project') render();
        return;
      }

      google.script.run
        .withSuccessHandler(function (list) {
          projectList = list || [];
          projectListLoadedFor = siteType;
          projectListLoading = false;
          if (currentStepId === 'project') render();
        })
        .withFailureHandler(function (err) {
          projectListLoading = false;
          console.error(err);
        })
        .getProjectNames(siteType);
    }

    function renderField(step) {
      const content = document.getElementById('content');
      let html = '<section class="field-panel"><div class="question">' + escapeHtml(step.title) + '</div>';

      if (step.type === 'search') {
        html += '<div class="search-wrap">' +
          '<input type="text" id="field-project" placeholder="Start typing a project name" autocomplete="off" value="' + escapeHtml(answers.project || '') + '">' +
          '<div class="search-results" id="searchResults" style="display:none;"></div>' +
          '</div>';
      } else if (step.type === 'text') {
        html += '<input type="text" id="field-' + step.id + '" placeholder="Type your answer" value="' + escapeHtml(answers[step.id] || '') + '">';
      } else if (step.type === 'number') {
        html += '<input type="number" min="0" id="field-' + step.id + '" placeholder="0" value="' + escapeHtml(answers[step.id] || '') + '">';
      } else if (step.type === 'textarea') {
        html += '<textarea id="field-' + step.id + '" placeholder="Type your answer">' + escapeHtml(answers[step.id] || '') + '</textarea>';
      } else if (step.type === 'radio') {
        html += '<div class="pill-group">';
        step.options.forEach(o => {
          const sel = answers[step.id] === o ? ' selected' : '';
          html += '<button class="pill' + sel + '" type="button" data-option="' + escapeHtml(o) + '">' + escapeHtml(o) + '</button>';
        });
        html += '</div>';
      } else if (step.type === 'yesno') {
        html += '<div class="yesno-group">';
        ['Yes', 'No'].forEach(o => {
          const sel = answers[step.id] === o ? ' selected' : '';
          html += '<button class="yesno-btn' + sel + '" type="button" data-option="' + escapeHtml(o) + '">' + escapeHtml(o) + '</button>';
        });
        html += '</div>';
      } else if (step.type === 'file') {
        const files = step.multiple ? (answers[step.id] || []) : (answers[step.id] ? [answers[step.id]] : []);
        const hasFiles = files.length > 0;
        html += '<div class="file-drop' + (hasFiles ? ' has-files' : '') + '" id="fileDrop-' + step.id + '" role="button" tabindex="0">' +
          (hasFiles ? files.length + ' file(s) selected - tap to add more' : 'Tap to capture or upload') +
          '</div>' +
          '<input type="file" id="fileInput-' + step.id + '" accept="image/*,.pdf" ' + (step.multiple ? 'multiple' : '') + ' style="display:none;">' +
          '<div class="file-list" id="fileList-' + step.id + '"></div>';
      }

      html += '</section>';
      content.innerHTML = html;

      if (step.type === 'search') {
        const input = document.getElementById('field-project');
        input.addEventListener('input', onProjectSearch);
        input.addEventListener('focus', onProjectSearch);
        if (projectListLoading) {
          const results = document.getElementById('searchResults');
          results.style.display = 'block';
          results.innerHTML = '<div class="search-loading">Loading ' + escapeHtml(answers.siteType) + ' project list...</div>';
        }
      }

      if (['text', 'number', 'textarea'].includes(step.type)) {
        document.getElementById('field-' + step.id).addEventListener('input', function (e) {
          answers[step.id] = e.target.value;
          updateNextButton();
        });
      }

      if (step.type === 'radio' || step.type === 'yesno') {
        content.querySelectorAll('[data-option]').forEach(function (btn) {
          btn.addEventListener('click', function () {
            selectOption(step.id, btn.dataset.option);
          });
        });
      }

      if (step.type === 'file') {
        const input = document.getElementById('fileInput-' + step.id);
        const drop = document.getElementById('fileDrop-' + step.id);
        drop.addEventListener('click', function () { input.click(); });
        drop.addEventListener('keydown', function (event) {
          if (event.key === 'Enter' || event.key === ' ') {
            event.preventDefault();
            input.click();
          }
        });
        input.addEventListener('change', function () {
          handleFiles(step.id, input.files, !!step.multiple);
        });
        renderFileList(step);
      }
    }

    function onProjectSearch(e) {
      const q = e.target.value.trim().toLowerCase();
      const resultsEl = document.getElementById('searchResults');

      if (projectListLoading) {
        resultsEl.innerHTML = '<div class="search-loading">Loading ' + escapeHtml(answers.siteType) + ' project list...</div>';
        resultsEl.style.display = 'block';
        return;
      }

      if (!q) {
        resultsEl.style.display = 'none';
        return;
      }

      const matches = projectList.filter(p => p.toLowerCase().includes(q)).slice(0, 8);
      if (matches.length === 0) {
        resultsEl.innerHTML = '<div class="search-empty">No matching project - check spelling</div>';
      } else {
        resultsEl.innerHTML = matches.map(m => '<button class="search-item" type="button">' + escapeHtml(m) + '</button>').join('');
        resultsEl.querySelectorAll('.search-item').forEach(function (item, index) {
          item.addEventListener('mousedown', function (event) {
            event.preventDefault();
            selectProject(matches[index]);
          });
        });
      }
      resultsEl.style.display = 'block';
    }

    function selectProject(name) {
      answers.project = name;
      document.getElementById('field-project').value = name;
      document.getElementById('searchResults').style.display = 'none';
      updateNextButton();
    }

    function selectOption(stepId, value) {
      answers[stepId] = value;
      if (stepId === 'siteType') {
        answers.project = undefined;
        loadProjectList(value);
      }
      render();
    }

    async function handleFiles(stepId, fileListRaw, multiple) {
      const step = STEPS.find(s => s.id === stepId);
      const newFiles = await Promise.all(Array.from(fileListRaw).map(async f => ({
        name: f.name,
        mimeType: f.type || 'application/octet-stream',
        base64: await fileToBase64(f)
      })));

      if (multiple) {
        answers[stepId] = (answers[stepId] || []).concat(newFiles);
      } else {
        answers[stepId] = newFiles[0];
      }

      renderField(step);
      updateNextButton();
    }

    function renderFileList(step) {
      const listEl = document.getElementById('fileList-' + step.id);
      const files = step.multiple ? (answers[step.id] || []) : (answers[step.id] ? [answers[step.id]] : []);
      listEl.innerHTML = files.map((f, i) =>
        '<div class="file-chip"><span>' + escapeHtml(f.name) + '</span><button class="file-remove" type="button" data-remove-index="' + i + '">Remove</button></div>'
      ).join('');

      listEl.querySelectorAll('[data-remove-index]').forEach(function (btn) {
        btn.addEventListener('click', function () {
          removeFile(step.id, Number(btn.dataset.removeIndex), !!step.multiple);
        });
      });
    }

    function removeFile(stepId, index, multiple) {
      const step = STEPS.find(s => s.id === stepId);
      if (multiple) {
        answers[stepId].splice(index, 1);
      } else {
        answers[stepId] = null;
      }
      renderField(step);
      updateNextButton();
    }

    function updateNextButton() {
      const vs = getVisibleSteps();
      const idx = currentIndex();
      const step = vs[idx];
      document.getElementById('nextBtn').disabled = !isValid(step);
    }

    function render() {
      const vs = getVisibleSteps();
      let idx = currentIndex();
      if (idx === -1) {
        currentStepId = vs[0].id;
        idx = 0;
      }

      const step = vs[idx];
      document.getElementById('stepLabel').textContent = 'Step ' + (idx + 1) + ' of ' + vs.length;
      document.getElementById('progressFill').style.width = Math.round(((idx + 1) / vs.length) * 100) + '%';
      document.getElementById('backBtn').disabled = idx === 0;
      document.getElementById('nextBtn').textContent = idx === vs.length - 1 ? 'Submit report' : 'Next';
      document.getElementById('siteChip').textContent = answers.siteType || 'Draft';
      renderField(step);
      updateNextButton();
    }

    function goNext() {
      const vs = getVisibleSteps();
      const idx = currentIndex();
      if (idx === vs.length - 1) {
        submitForm();
        return;
      }
      currentStepId = vs[idx + 1].id;
      render();
    }

    function goBack() {
      const vs = getVisibleSteps();
      const idx = currentIndex();
      if (idx > 0) {
        currentStepId = vs[idx - 1].id;
        render();
      }
    }

    function submitForm() {
      if (submitting) return;
      submitting = true;
      document.getElementById('app').innerHTML =
        '<div class="center-screen"><div class="spinner"></div><h2>Submitting report</h2><p>Uploading photos and saving your entry.</p></div>';

      if (!window.google || !google.script || !google.script.run) {
        onSubmitError({ message: 'This form must be opened from the Apps Script web app URL.' });
        return;
      }

      const payload = {
        siteType: answers.siteType,
        project: answers.project,
        people: answers.people,
        engineer: answers.engineer,
        activity: answers.activity,
        nextPlan: answers.nextPlan,
        photos: answers.photo || [],
        amendment: answers.amendment,
        amendmentWhy: answers.amendmentWhy,
        drawingChange: answers.drawingChange,
        drawingPhoto: answers.drawingPhoto || null,
        measurement: answers.measurement,
        measurementFile: answers.measurementFile || null
      };

      google.script.run
        .withSuccessHandler(onSubmitSuccess)
        .withFailureHandler(onSubmitError)
        .submitSiteReport(payload);
    }

    function onSubmitSuccess(result) {
      submitting = false;
      if (!result || !result.success) {
        onSubmitError({ message: (result && result.error) || 'Unknown error' });
        return;
      }
      var pdfButton = result.pdfUrl
        ? '<a class="btn btn-next" style="flex:none; padding:15px 24px; display:inline-flex; align-items:center; justify-content:center; text-decoration:none;" target="_blank" href="' + escapeHtml(result.pdfUrl) + '">Open PDF</a>'
        : '';
      document.getElementById('app').innerHTML =
        '<div class="center-screen">' +
        '<h2>Report submitted</h2>' +
        '<p>Your ' + escapeHtml(answers.siteType) + ' site visit report has been saved and the PDF has been generated.</p>' +
        pdfButton +
        '<button class="btn btn-next" style="flex:none; padding:0 24px;" onclick="location.reload()">Submit another report</button>' +
        '</div>';
    }

    function onSubmitError(err) {
      submitting = false;
      document.getElementById('app').innerHTML =
        '<div class="center-screen">' +
        '<h2>Something went wrong</h2>' +
        '<p>' + escapeHtml(err && err.message ? err.message : 'Please try again.') + '</p>' +
        '<button class="btn btn-next" style="flex:none; padding:0 24px;" onclick="location.reload()">Start over</button>' +
        '</div>';
    }

    document.getElementById('backBtn').addEventListener('click', goBack);
    document.getElementById('nextBtn').addEventListener('click', goNext);

    render();
  </script>
</body>
</html>
