name: Deploy PMS to GCP

# Every push/merge to main SSHes to the VM and runs scripts/deploy.sh.
on:
  push:
    branches: [ main ]
  workflow_dispatch: {}          # manual "Run workflow" button too

concurrency:
  group: production-deploy
  cancel-in-progress: false      # never interrupt a deploy in progress

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            bash /var/www/html/pms/scripts/deploy.sh
