<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root {
      --red: #c82027;
      --red-dark: #a2161c;
      --orange: #f6b500;
      --ink: #252525;
      --muted: #8a8a8a;
      --line: #e9e9e9;
      --panel: #ffffff;
      --bg: #f7f7f7;
      --soft: #fff7f4;
      --shadow: 0 10px 28px rgba(0,0,0,.08);
      --radius: 12px;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: #f5f5f5; }
    body { font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; color: var(--ink); }
    button, input, textarea, select { font: inherit; }
    img { max-width: 100%; }

    .app-wrap { min-height: 100vh; min-height: 100svh; padding: 18px 20px 32px; background: linear-gradient(180deg, #fbfbfb 0%, #f5f5f5 100%); }
    .shell { max-width: 1150px; margin: 0 auto; }

    /* ---------- Professional header ---------- */
    .brandbar {
      width: 100%;
      background: #fff;
      border: 0;
      border-radius: 6px 6px 0 0;
      overflow: hidden;
      position: relative;
      aspect-ratio: 1125 / 186;
      box-shadow: 0 4px 18px rgba(0,0,0,.04);
    }
    .brandbar-row {
      display: flex;
      align-items: center;
      gap: 22px;
      padding: 18px 30px;
      flex-wrap: wrap;
    }
    .brand-id { flex: 0 0 auto; display: flex; align-items: center; }
    .brand-logo { display: block; height: 54px; width: auto; max-width: 240px; object-fit: contain; }
    .brand-copy {
      min-width: 0;
      padding-left: 22px;
      border-left: 1px solid #ececec;
    }
    .brand-title { font-size: clamp(21px, 3.4vw, 32px); font-weight: 800; color: var(--ink); letter-spacing: .01em; line-height: 1.05; }
    .brand-title .accent { color: var(--red); }
    .brand-sub { font-size: 11.5px; color: var(--muted); margin-top: 4px; text-transform: uppercase; letter-spacing: .16em; font-weight: 700; }
    .brand-spacer { flex: 1 1 auto; }
    .brand-badge {
      flex: 0 0 auto;
      display: inline-flex; align-items: center; gap: 8px;
      padding: 8px 14px;
      border-radius: 999px;
      background: var(--soft);
      border: 1px solid #f3d6d3;
      color: var(--red-dark);
      font-size: 12px; font-weight: 800; letter-spacing: .04em;
    }
    .brand-badge .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--red); }
    .hero-img {
      display: block;
      width: 102.222%;
      max-width: none;
      height: auto;
      position: absolute;
      left: -1.778%;
      top: -7.527%;
    }
    .brandbar .brandbar-row,
    .brandbar-accent {
      display: none;
    }

    /* ---------- Stepper ---------- */
    .stepper {
      background: #fff;
      border-left: 1px solid #efefef;
      border-right: 1px solid #efefef;
      border-bottom: 1px solid #efefef;
      padding: 14px 48px 12px;
    }
    .step-track { position: relative; display: grid; grid-template-columns: repeat(4, 1fr); align-items: start; }
    .step-track::before {
      content: ""; position: absolute; top: 14px; left: 12%; right: 12%; height: 2px; background: #ececec; z-index: 0;
    }
    .step-track::after {
      content: ""; position: absolute; top: 14px; left: 12%; width: calc((76%/3) * var(--progress)); height: 2px; background: var(--red); z-index: 1; transition: width .25s ease;
    }
    .step { text-align: center; position: relative; z-index: 2; }
    .bubble {
      width: 28px; height: 28px; border-radius: 50%; display:flex; align-items:center; justify-content:center;
      border: 2px solid #cfcfcf; background:#fff; color:#7b7b7b; font-weight: 700; margin: 0 auto 8px; transition: all .2s ease;
    }
    .step.active .bubble, .step.done .bubble { background: var(--red); border-color: var(--red); color:#fff; }
    .step-label { font-size: 10px; font-weight: 700; color:#8b8b8b; letter-spacing: .02em; text-transform: uppercase; }
    .step.active .step-label { color: var(--red); }

    /* ---------- Panel ---------- */
    .panel {
      margin-top: 18px; background: var(--panel); border: 1px solid var(--line); border-radius: 10px; box-shadow: var(--shadow);
      padding: 20px 20px 18px;
    }
    .twocol { display:grid; grid-template-columns: 1fr 1fr; gap: 0; }
    .col { padding: 0 22px 0 0; min-width: 0; }
    .col + .col { border-left: 1px solid #ececec; padding: 0 0 0 24px; }

    .section { margin-bottom: 22px; }
    .section:last-child { margin-bottom: 0; }
    .section-head { display:flex; align-items:flex-start; gap:10px; margin-bottom: 10px; }
    .icon { width: 18px; height: 18px; color: var(--red); flex: 0 0 auto; margin-top:2px; }
    .section-title { font-size: 13px; font-weight: 800; line-height: 1.2; text-transform: uppercase; color: #333; }
    .section-sub { font-size: 11px; color: #9a9a9a; margin-top: 3px; }

    .option-grid.two { display:grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 12px; }
    .option-grid.four { display:grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 10px; }
    .card-option {
      position: relative; border: 1px solid #e1e1e1; border-radius: 8px; min-height: 80px; padding: 14px 10px 10px; text-align:center; cursor:pointer; background:#fff;
      display:flex; flex-direction: column; align-items:center; justify-content:center; gap:8px; transition: all .2s ease;
    }
    .card-option:hover { border-color: #f0a9ac; box-shadow: 0 5px 14px rgba(200,32,39,.06); }
    .card-option.selected { border-color: #eaa0a4; background: #fff9f9; }
    .mini-radio { position:absolute; top:8px; right:8px; width:16px; height:16px; border-radius:50%; border:1.5px solid #cfcfcf; background:#fff; }
    .card-option.selected .mini-radio { background: var(--red); border-color: var(--red); box-shadow: inset 0 0 0 4px #fff; }
    .option-icon { font-size: 32px; line-height: 1; color:#b6b6b6; }
    .option-name { font-size: 12px; font-weight: 600; color:#444; }
    .option-note { font-size: 11px; color:#8a8a8a; }

    .pill-row { display:grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 10px; }
    .pill {
      height: 36px; border:1px solid #dfdfdf; background:#fff; border-radius: 6px; display:flex; align-items:center; gap:10px; padding: 0 12px; cursor:pointer; position:relative;
      font-size: 12px; color:#444; white-space: nowrap; overflow:hidden; text-overflow: ellipsis; transition: all .18s ease;
    }
    .pill:hover { border-color:#eaa8ab; }
    .pill.selected { border-color:#e6969b; background:#fff8f8; color:#222; }
    .pill-dot { width: 12px; height: 12px; border-radius:50%; border:1.5px solid #cfcfcf; flex:0 0 auto; }
    .pill.selected .pill-dot { background: var(--red); border-color: var(--red); box-shadow: inset 0 0 0 3px #fff; }

    .select-wrap { position: relative; }
    .select-wrap::after {
      content: "";
      position: absolute;
      right: 16px;
      top: 50%;
      width: 8px;
      height: 8px;
      border-right: 1.8px solid #8f8f8f;
      border-bottom: 1.8px solid #8f8f8f;
      transform: translateY(-65%) rotate(45deg);
      pointer-events: none;
    }
    .select-field {
      width: 100%;
      height: 44px;
      border: 1px solid #e2e2e2;
      border-radius: 6px;
      background: #fff;
      color: #333;
      padding: 0 44px 0 14px;
      outline: none;
      appearance: none;
      cursor: pointer;
      transition: all .18s ease;
    }
    .select-field:focus {
      border-color: #eaa0a4;
      box-shadow: 0 0 0 3px rgba(200,32,39,.07);
    }

    .search-wrap { position: relative; }
    .field, .textarea, .selectish {
      width:100%; height: 44px; border:1px solid #e2e2e2; border-radius: 6px; background:#fff; padding: 0 14px; color:#333;
      outline:none; transition: all .18s ease;
    }
    .textarea { height: 82px; padding: 12px 14px; resize: vertical; min-height: 82px; }
    .field:focus, .textarea:focus, .selectish.focus { border-color: #eaa0a4; box-shadow: 0 0 0 3px rgba(200,32,39,.07); }

    .search-results { position:absolute; top: calc(100% + 6px); left:0; right:0; background:#fff; border:1px solid #e4e4e4; border-radius:8px; box-shadow: 0 12px 24px rgba(0,0,0,.08); max-height: 220px; overflow:auto; z-index:20; display:none; }
    .search-item, .search-empty, .search-loading { padding: 11px 12px; font-size: 13px; }
    .search-item { cursor:pointer; display:block; width:100%; text-align:left; border:0; border-bottom:1px solid #f2f2f2; background:#fff; color:#333; }
    .search-item:last-child { border-bottom:0; }
    .search-item:hover { background:#fff5f5; }
    .search-empty, .search-loading { color:#8b8b8b; }

    .number-box { width: 130px; display:flex; align-items:center; border:1px solid #e2e2e2; border-radius:6px; overflow:hidden; height: 40px; }
    .num-btn { width: 36px; height: 40px; border:0; background:#fafafa; cursor:pointer; color:var(--red); font-size: 18px; transition: background .15s ease; }
    .num-btn:hover { background:#fff2f2; }
    .num-input { flex:1; width:100%; height: 40px; border:0; text-align:center; font-size: 14px; outline:none; }

    .dropzone { border: 1.6px dashed #ef9b9f; border-radius: 8px; padding: 16px 12px; text-align:center; background:#fff; cursor:pointer; min-height: 78px; display:flex; flex-direction:column; align-items:center; justify-content:center; transition: all .18s ease; }
    .dropzone:hover { border-color: var(--red); background:#fff8f8; }
    .dropzone.has-files { background: #fff8f8; border-color: var(--red); }
    .drop-icon { font-size: 30px; color: var(--red); line-height: 1; }
    .drop-main { font-size: 12px; color: #666; margin-top:4px; }
    .drop-main b { color: var(--red); font-weight: 700; }
    .drop-sub { font-size: 10px; color: #aaa; margin-top:4px; }
    .file-list { display:flex; flex-direction:column; gap:8px; margin-top: 10px; }
    .file-chip { display:flex; align-items:center; justify-content:space-between; padding:8px 10px; border:1px solid #eee; border-radius:6px; background:#fafafa; font-size:12px; gap:10px; min-width:0; }
    .file-chip span { min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .file-chip button { border:0; background:none; color:var(--red-dark); cursor:pointer; font-weight:700; flex:0 0 auto; }

    .yesno-row { display:flex; gap: 10px; }
    .yesno-btn { flex:1; height: 40px; border:1px solid #ddd; border-radius:6px; background:#fff; font-weight: 600; cursor:pointer; color:#666; transition: all .18s ease; }
    .yesno-btn:hover { border-color:#eaa8ab; }
    .yesno-btn.selected { border-color:#e6969b; color:var(--red-dark); background:#fff8f8; }

    .hint-note { font-size: 11px; color:#999; display:flex; align-items:center; gap:8px; padding-top:4px; }
    .divider { height:1px; background:#f0f0f0; margin:16px 0; }

    .subgrid { display:grid; grid-template-columns: 1.2fr .8fr; gap:18px; align-items:start; }

    .info-card { padding:14px 16px; border:1px solid #f0e6e2; border-radius:8px; background:#fffaf8; display:flex; gap:14px; align-items:flex-start; }
    .info-card img { width:60px; height:auto; opacity:.95; flex:0 0 auto; }
    .info-card .info-title { font-size:15px; font-weight:800; color:#333; margin-bottom:4px; }
    .info-card .info-text { font-size:13px; color:#777; line-height:1.5; }

    .actionbar { display:flex; align-items:center; justify-content:space-between; gap:10px; border-top:1px solid #f0f0f0; padding-top:16px; margin-top:20px; }
    .actions-left, .actions-right { display:flex; gap:10px; }
    .btn { height: 40px; padding: 0 18px; border-radius:6px; border:1px solid #ddd; background:#fff; cursor:pointer; font-weight:700; color:#555; transition: all .18s ease; }
    .btn:hover:not(:disabled) { box-shadow: 0 6px 16px rgba(0,0,0,.06); }
    .btn.primary { background: linear-gradient(180deg, #d5242c, var(--red)); border-color: var(--red); color:#fff; min-width: 150px; box-shadow: 0 10px 22px rgba(200,32,39,.18); }
    .btn.primary:disabled { opacity: .45; cursor:not-allowed; box-shadow:none; }
    .btn.ghost { background:#fff; }

    .review-grid { display:grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 14px; }
    .review-card { border:1px solid #ececec; border-radius:8px; padding:14px 16px; background:#fff; }
    .review-card h4 { margin:0 0 8px; font-size: 13px; text-transform: uppercase; color:#444; letter-spacing:.03em; }
    .review-row { display:flex; justify-content:space-between; gap:12px; padding:7px 0; border-top:1px dashed #f0f0f0; font-size:13px; }
    .review-row:first-of-type { border-top:0; padding-top:0; }
    .review-row span:first-child { color:#888; flex:0 0 auto; }
    .review-row span:last-child { color:#222; font-weight:600; text-align:right; word-break: break-word; }
    .ready-note { font-size:13px; color:#666; line-height:1.6; }

    .center-screen { min-height: 60vh; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; background:#fff; border:1px solid #eee; border-radius:10px; margin-top:18px; padding:40px 24px; }
    .center-screen h2 { margin:0 0 8px; font-size: 28px; }
    .center-screen p { margin:0 0 20px; color:#777; max-width:500px; line-height:1.5; }
    .center-actions { display:flex; gap:12px; flex-wrap:wrap; justify-content:center; }
    .spinner { width:34px; height:34px; border-radius:50%; border:3px solid #f6dcdd; border-top-color: var(--red); animation:spin .8s linear infinite; margin-bottom:16px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ---------- Responsive ---------- */
    @media (max-width: 980px) {
      .twocol, .review-grid { grid-template-columns: 1fr; }
      .col { padding-right:0; }
      .col + .col { border-left:0; border-top:1px solid #ececec; padding:18px 0 0; margin-top:2px; }
      .pill-row { grid-template-columns: repeat(2, minmax(0,1fr)); }
      .stepper { padding: 12px 24px 10px; }
    }
    @media (max-width: 760px) {
      .app-wrap { padding:10px 10px 22px; }
      .brandbar-row { padding: 14px 16px; gap:14px; }
      .brand-logo { height: 42px; }
      .brand-copy { padding-left:14px; }
      .brand-title { font-size: 17px; }
      .brand-badge { display:none; }
      .stepper { padding: 10px 12px 10px; }
      .step-label { font-size: 9px; }
      .option-grid.four { grid-template-columns: repeat(2, minmax(0,1fr)); }
      .option-grid.two, .pill-row, .subgrid { grid-template-columns: 1fr; }
      .subgrid { gap:22px; }
      .panel { padding:16px; }
      .actionbar { flex-direction: column; align-items:stretch; }
      .actions-left, .actions-right { width:100%; }
      .actions-left .btn, .actions-right .btn { flex:1; min-width:0; }
    }
    @media (max-width: 480px) {
      .brandbar-row { gap:12px; }
      .brand-copy { padding-left:0; border-left:0; }
      .brand-id { width:100%; }
      .brand-logo { height: 40px; }
      .brand-sub { letter-spacing:.1em; }
      .center-screen h2 { font-size: 24px; }
      .number-box { width:100%; }
      .step-label { font-size: 8.5px; }
      .info-card img { width:48px; }
    }
  </style>
</head>

    const ENGINEERS = ['Dada', 'Nagraj', 'Pratik', 'Ranjeet', 'Paresh', 'Shubham', 'Ganesh', 'Vrundavan', 'Parikshit'];

    function iconCalendar() { return `<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="16" rx="2"></rect><path d="M16 3v4M8 3v4M3 11h18"></path></svg>`; }

    function iconPhoto() { return `<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>`; }
    function iconProject() { return `<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 21h18"></path><path d="M5 21V7l8-4 6 3v15"></path><path d="M9 9h.01M9 13h.01M9 17h.01M13 9h.01M13 13h.01M13 17h.01"></path></svg>`; }
    function iconAc() { return `<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="6" rx="2"></rect><path d="M6 15c1 1 1 2 0 3M11 15c1 1 1 2 0 3M16 15c1 1 1 2 0 3"></path></svg>`; }

    function escapeHtml(str) {
      return String(str === undefined || str === null ? '' : str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result.split(',')[1]);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    function loadProjectList(siteType) {
      projectListLoading = true;
      renderCurrentPage();
      if (!window.google || !google.script || !google.script.run) {
        projectList = [];
        projectListLoading = false;
        renderCurrentPage();
        return;
      }
      google.script.run
        .withSuccessHandler(function (list) {
          projectList = list || [];
          projectListLoading = false;
          renderCurrentPage();
        })
        .withFailureHandler(function (err) {
          projectListLoading = false;
          console.error(err);
          renderCurrentPage();
        })
        .getProjectNames(siteType);
    }

    function isStep1Valid() {
      return !!answers.siteType && String(answers.project||'').trim() !== '' && String(answers.people||'').trim() !== '' && !!answers.engineer && String(answers.activity||'').trim() !== '' && Array.isArray(answers.photo) && answers.photo.length > 0 && !!answers.amendment;
    }
    function isStep2Valid() {
      const amendOk = answers.amendment === 'Yes' ? String(answers.amendmentWhy || '').trim() !== '' : true;
      return String(answers.nextPlan || '').trim() !== '' && !!answers.drawingChange && amendOk;
    }
    function isStep3Valid() {
      const drawingOk = answers.drawingChange === 'Yes' ? !!answers.drawingPhoto : true;
      const measurementOk = answers.measurement === 'Yes' ? !!answers.measurementFile : true;
      return drawingOk && !!answers.measurement && measurementOk;
    }
    function isCurrentPageValid() {
      if (currentPage === 0) return isStep1Valid();
      if (currentPage === 1) return isStep2Valid();
      if (currentPage === 2) return isStep3Valid();
      return true;
    }

    function updateStepper() {
      const track = document.getElementById('stepTrack');
      track.style.setProperty('--progress', currentPage / 3);
      for (let i = 0; i < 4; i++) {
        const el = document.getElementById('step-bubble-' + i);
        el.className = 'step' + (i === currentPage ? ' active' : i < currentPage ? ' done' : '');
      }
    }

    function renderCurrentPage() {
      updateStepper();
      const mount = document.getElementById('pageMount');
      if (currentPage === 0) mount.innerHTML = renderStep1();
      else if (currentPage === 1) mount.innerHTML = renderStep2();
      else if (currentPage === 2) mount.innerHTML = renderStep3();
      else mount.innerHTML = renderReview();
      bindCommonEvents();
      updatePrimaryButton();
      if (currentPage === 0) bindProjectSearch();
    }

    function renderStep1() {
      const siteType = answers.siteType || '';
      const project = answers.project || '';
      const people = (answers.people === undefined || answers.people === null) ? '' : answers.people;

                  <div class="card-option ${siteType === 'Non-VRV' ? 'selected' : ''}" onclick="selectSiteType('Non-VRV')">

                    <button class="yesno-btn ${amend === 'No' ? 'selected' : ''}" type="button" onclick="setYesNo('amendment','No')">No</button>
                  </div>
                </div>
              </div>
            </div>
          </div>
          ${renderActionBar()}
        </div>
      `;
    }

    function renderStep2() {
      const nextPlan = answers.nextPlan || '';
      const drawingChange = answers.drawingChange || '';
      const amendmentWhy = answers.amendmentWhy || '';
      return `
        <div class="panel">
          <div class="twocol">
            <div class="col">
              <div class="section">
                <div class="section-head">
                  ${iconNotes()}
                  <div><div class="section-title">Plan for Tomorrow</div><div class="section-sub">What is the plan for this site tomorrow?</div></div>
                </div>
                <textarea class="textarea" id="nextPlanInput" placeholder="Enter the next day plan / upcoming work...">${escapeHtml(nextPlan)}</textarea>
              </div>
              <div class="section">
                <div class="section-head">
                  ${iconProject()}
                  <div><div class="section-title">Drawing Change</div><div class="section-sub">Any changes in drawing as per project condition?</div></div>
                </div>
                <div class="yesno-row">
                  <button class="yesno-btn ${drawingChange === 'Yes' ? 'selected' : ''}" type="button" onclick="setYesNo('drawingChange','Yes')">Yes</button>
                  <button class="yesno-btn ${drawingChange === 'No' ? 'selected' : ''}" type="button" onclick="setYesNo('drawingChange','No')">No</button>
                </div>
              </div>
            </div>
            <div class="col">
              <div class="section">
                <div class="section-head">
                  ${iconNotes()}
                  <div><div class="section-title">Amendment Notes</div><div class="section-sub">If amendment / PO / approval is required, explain why.</div></div>
                </div>
                <textarea class="textarea" id="amendmentWhyInput" placeholder="If yes &mdash; mention why..." ${answers.amendment === 'Yes' ? '' : 'disabled style="background:#fafafa;color:#999;"'}>${escapeHtml(amendmentWhy)}</textarea>
              </div>
              <div class="section" style="margin-bottom:0;">
                <div class="info-card">
                  <img src="${LOGO_DATA_URI}" alt="Vakharia Airtech">
                  <div>
                    <div class="info-title">Project Details</div>
                    <div class="info-text">Add the plan for tomorrow and flag any drawing or amendment changes for this visit. Complete the required fields to continue.</div>
                  </div>
                </div>
              </div>
            </div>
          </div>
          ${renderActionBar()}
        </div>
      `;
    }

    function renderStep3() {
      const drawingPhoto = answers.drawingPhoto ? [answers.drawingPhoto] : [];
      const measurement = answers.measurement || '';
      const measurementFile = answers.measurementFile ? [answers.measurementFile] : [];
      return `
        <div class="panel">
          <div class="twocol">
            <div class="col">
              <div class="section">
                <div class="section-head">
                  ${iconPhoto()}
                  <div><div class="section-title">Drawing Change Photo</div><div class="section-sub">Upload the drawing change photo if changes were reported.</div></div>
                </div>
                <div class="dropzone ${drawingPhoto.length ? 'has-files' : ''}" onclick="document.getElementById('drawingPhotoInput').click()">
                  <div class="drop-icon">&#9729;</div>
                  <div class="drop-main">Upload drawing photo</div>
                  <div class="drop-sub">Required when drawing change is Yes</div>
                </div>
                <input type="file" id="drawingPhotoInput" accept="image/*,.pdf" style="display:none;" onchange="handleFiles('drawingPhoto', this.files, false)">
                <div class="file-list" id="fileList-drawingPhoto"></div>
              </div>
            </div>
            <div class="col">
              <div class="section">
                <div class="section-head">
                  ${iconCalendar()}
                  <div><div class="section-title">Measurement Report</div><div class="section-sub">Measurement report created today?</div></div>
                </div>
                <div class="yesno-row">
                  <button class="yesno-btn ${measurement === 'Yes' ? 'selected' : ''}" type="button" onclick="setYesNo('measurement','Yes')">Yes</button>
                  <button class="yesno-btn ${measurement === 'No' ? 'selected' : ''}" type="button" onclick="setYesNo('measurement','No')">No</button>
                </div>
              </div>
              <div class="section" style="margin-bottom:0;">
                <div class="section-head">
                  ${iconPhoto()}
                  <div><div class="section-title">Measurement Report File</div><div class="section-sub">Upload the measurement report when created today.</div></div>
                </div>
                <div class="dropzone ${measurementFile.length ? 'has-files' : ''}" onclick="document.getElementById('measurementFileInput').click()">
                  <div class="drop-icon">&#9729;</div>
                  <div class="drop-main">Upload measurement report</div>
                  <div class="drop-sub">PDF / Image accepted</div>
                </div>
                <input type="file" id="measurementFileInput" accept="image/*,.pdf" style="display:none;" onchange="handleFiles('measurementFile', this.files, false)">
                <div class="file-list" id="fileList-measurementFile"></div>
              </div>
            </div>
          </div>
          ${renderActionBar()}
        </div>
      `;
    }

    function renderReview() {
      const photoNames = (answers.photo || []).map(f => f.name).join(', ');
      return `
        <div class="panel">
          <div class="review-grid">
            <div class="review-card">
              <h4>Site Details</h4>
              ${reviewRow('Site Type', answers.siteType || '-')}
              ${reviewRow('Project', answers.project || '-')}
              ${reviewRow('People on Site', answers.people || '-')}
              ${reviewRow('Engineer', answers.engineer || '-')}
              ${reviewRow('Amendment', answers.amendment || '-')}
            </div>
            <div class="review-card">
              <h4>Notes &amp; Files</h4>
              ${reviewRow('Activity', answers.activity || '-')}
              ${reviewRow('Plan for Tomorrow', answers.nextPlan || '-')}
              ${reviewRow('Amendment Why', answers.amendmentWhy || '-')}
              ${reviewRow('Site Photos', photoNames || '-')}
              ${reviewRow('Drawing Change', answers.drawingChange || '-')}
            </div>
            <div class="review-card">
              <h4>Drawings &amp; Reports</h4>
              ${reviewRow('Drawing Photo', answers.drawingPhoto ? answers.drawingPhoto.name : '-')}
              ${reviewRow('Measurement Created', answers.measurement || '-')}
              ${reviewRow('Measurement File', answers.measurementFile ? answers.measurementFile.name : '-')}
            </div>
            <div class="review-card">
              <h4>Ready to Submit</h4>
              <div class="ready-note">Please review all details carefully. When you submit, your site visit report will be saved and a PDF will be generated automatically.</div>
            </div>
          </div>
          ${renderActionBar(true)}
        </div>
      `;
    }

    function reviewRow(label, value) {
      return `<div class="review-row"><span>${escapeHtml(label)}</span><span>${escapeHtml(String(value))}</span></div>`;
    }

    function renderActionBar(isSubmit = false) {
      return `
        <div class="actionbar">
          <div class="actions-left">
            <button class="btn ghost" type="button" onclick="goBack()" ${currentPage === 0 ? 'disabled' : ''}>Back</button>
            <button class="btn ghost" type="button" onclick="saveDraft()">Save Draft</button>
          </div>
          <div class="actions-right">
            <button class="btn ghost" type="button" onclick="clearCurrentPage()">Clear</button>
            <button class="btn primary" type="button" id="primaryBtn" onclick="${isSubmit ? 'submitForm()' : 'goNext()'}">${isSubmit ? 'Submit Report' : 'Save &amp; Next'} &rarr;</button>
          </div>
        </div>
      `;
    }

    function bindCommonEvents() {
      const activity = document.getElementById('activityInput');
      if (activity) activity.addEventListener('input', e => { answers.activity = e.target.value; updatePrimaryButton(); });
      const nextPlan = document.getElementById('nextPlanInput');
      if (nextPlan) nextPlan.addEventListener('input', e => { answers.nextPlan = e.target.value; updatePrimaryButton(); });
      const amendmentWhy = document.getElementById('amendmentWhyInput');
      if (amendmentWhy) amendmentWhy.addEventListener('input', e => { answers.amendmentWhy = e.target.value; updatePrimaryButton(); });
      renderFileLists();
    }

    function bindProjectSearch() {
      const input = document.getElementById('field-project');
      if (!input) return;
      input.addEventListener('input', function(e) { answers.project = e.target.value; onProjectSearch(e); updatePrimaryButton(); });
      input.addEventListener('focus', function(e) { onProjectSearch(e); });
      document.addEventListener('click', onDocProjectClick, true);
    }

    function onDocProjectClick(e) {
      const wrap = document.querySelector('.search-wrap');
      const res = document.getElementById('searchResults');
      if (!wrap || !res) return;
      if (!wrap.contains(e.target)) res.style.display = 'none';
    }

    function onProjectSearch(e) {
      const q = (e.target.value || '').trim().toLowerCase();
      const resultsEl = document.getElementById('searchResults');
      if (!resultsEl) return;
      if (projectListLoading) {
        resultsEl.innerHTML = '<div class="search-loading">Loading ' + escapeHtml(answers.siteType || 'site') + ' project list...</div>';
        resultsEl.style.display = 'block';
        return;
      }
      if (!q) { resultsEl.style.display = 'none'; return; }
      const matches = projectList.filter(p => p.toLowerCase().includes(q)).slice(0, 8);
      if (!matches.length) resultsEl.innerHTML = '<div class="search-empty">No matching project &mdash; check spelling</div>';
      else resultsEl.innerHTML = matches.map(m => '<button type="button" class="search-item" onmousedown="event.preventDefault();selectProject(' + JSON.stringify(m).replace(/"/g, '&quot;') + ')">' + escapeHtml(m) + '</button>').join('');
      resultsEl.style.display = 'block';
    }

    function selectProject(name) {
      answers.project = name;
      const input = document.getElementById('field-project');
      if (input) input.value = name;
      const resultsEl = document.getElementById('searchResults');
      if (resultsEl) resultsEl.style.display = 'none';
      updatePrimaryButton();
    }

    function selectSiteType(value) {
      answers.siteType = value;
      answers.project = '';
      loadProjectList(value);
    }
    function selectEngineer(value) { answers.engineer = value; renderCurrentPage(); }
    function setPeople(val) { answers.people = val; updatePrimaryButton(); }
    function adjustPeople(delta) {
      let cur = parseInt(answers.people || 0, 10);
      if (isNaN(cur)) cur = 0;
      cur += delta;
      if (cur < 0) cur = 0;
      answers.people = cur;
      const input = document.getElementById('peopleInput');
      if (input) input.value = cur;
      updatePrimaryButton();
    }
    function setYesNo(key, val) { answers[key] = val; renderCurrentPage(); }

    async function handleFiles(stepId, fileListRaw, multiple) {
      const newFiles = await Promise.all(Array.from(fileListRaw).map(async f => ({
        name: f.name,
        mimeType: f.type || 'application/octet-stream',
        base64: await fileToBase64(f)
      })));
      if (multiple) answers[stepId] = (answers[stepId] || []).concat(newFiles);
      else answers[stepId] = newFiles[0] || null;
      renderCurrentPage();
    }

    function renderFileLists() {
      renderFileList('photo', true);
      renderFileList('drawingPhoto', false);
      renderFileList('measurementFile', false);
    }
    function renderFileList(stepId, multiple) {
      const el = document.getElementById('fileList-' + stepId);
      if (!el) return;
      const files = multiple ? (answers[stepId] || []) : (answers[stepId] ? [answers[stepId]] : []);
      el.innerHTML = files.map((f, i) => `<div class="file-chip"><span>${escapeHtml(f.name)}</span><button type="button" onclick="removeFile('${stepId}',${i},${multiple})">Remove</button></div>`).join('');
    }
    function removeFile(stepId, index, multiple) {
      if (multiple) answers[stepId].splice(index, 1);
      else answers[stepId] = null;
      renderCurrentPage();
    }

    function goNext() {
      if (!isCurrentPageValid()) return;
      if (currentPage < 3) {
        currentPage++;
        renderCurrentPage();
      }
    }
    function goBack() {
      if (currentPage > 0) {
        currentPage--;
        renderCurrentPage();
      }
    }
    function updatePrimaryButton() {
      const btn = document.getElementById('primaryBtn');
      if (btn && currentPage < 3) btn.disabled = !isCurrentPageValid();
    }

    function clearCurrentPage() {
      if (currentPage === 0) { answers.siteType=''; answers.project=''; answers.people=''; answers.engineer=''; answers.activity=''; answers.photo=[]; answers.amendment=''; }
      else if (currentPage === 1) { answers.nextPlan=''; answers.drawingChange=''; answers.amendmentWhy=''; }
      else if (currentPage === 2) { answers.drawingPhoto=null; answers.measurement=''; answers.measurementFile=null; }
      renderCurrentPage();
    }

    function saveDraft() {
      try { localStorage.setItem('vakhariaSiteVisitDraft', JSON.stringify(answers)); alert('Draft saved locally in this browser.'); }
      catch(e) { console.error(e); alert('Unable to save draft in this browser.'); }
    }

    function submitForm() {
      if (submitting) return;
      submitting = true;
      document.getElementById('pageMount').innerHTML = '<div class="center-screen"><div class="spinner"></div><h2>Submitting report</h2><p>Uploading photos and saving your entry.</p></div>';

      if (!window.google || !google.script || !google.script.run) {
        onSubmitError({ message: 'This form must be opened from the Apps Script web app URL.' });
        return;
      }

      const payload = {
        siteType: answers.siteType,
        project: answers.project,
        people: answers.people,
        engineer: answers.engineer,
        activity: answers.activity,
        nextPlan: answers.nextPlan,
        photos: answers.photo || [],
        amendment: answers.amendment,
        amendmentWhy: answers.amendmentWhy,
        drawingChange: answers.drawingChange,
        drawingPhoto: answers.drawingPhoto || null,
        measurement: answers.measurement,
        measurementFile: answers.measurementFile || null
      };

      google.script.run
        .withSuccessHandler(onSubmitSuccess)
        .withFailureHandler(onSubmitError)
        .submitSiteReport(payload);
    }

    function onSubmitSuccess(result) {
      submitting = false;
      if (!result || !result.success) {
        onSubmitError({ message: (result && result.error) || 'Unknown error' });
        return;
      }
      try { localStorage.removeItem('vakhariaSiteVisitDraft'); } catch (e) {}
      var pdfButton = result.pdfUrl
        ? '<a class="btn primary" style="text-decoration:none;display:inline-flex;align-items:center;justify-content:center;" target="_blank" href="' + escapeHtml(result.pdfUrl) + '">Open PDF</a>'
        : '';
      document.getElementById('pageMount').innerHTML =
        '<div class="center-screen"><img src="' + LOGO_DATA_URI + '" alt="Vakharia Airtech" style="width:180px;height:auto;margin-bottom:14px;"><h2>Report submitted</h2><p>Your ' + escapeHtml(answers.siteType || '') + ' site visit report has been saved and the PDF has been generated.</p><div class="center-actions">' + pdfButton + '<button class="btn primary" type="button" onclick="location.reload()">Submit another report</button></div></div>';
    }
    function onSubmitError(err) {
      submitting = false;
      document.getElementById('pageMount').innerHTML = '<div class="center-screen"><h2>Something went wrong</h2><p>' + escapeHtml(err && err.message ? err.message : 'Please try again.') + '</p><div class="center-actions"><button class="btn primary" type="button" onclick="location.reload()">Start over</button></div></div>';
    }

    (function init() {
      try {
        const draft = localStorage.getItem('vakhariaSiteVisitDraft');
        if (draft) answers = JSON.parse(draft) || {};
      } catch(e) {}
      var bl = document.getElementById('brandLogo');
      if (bl) bl.src = LOGO_DATA_URI;
      renderCurrentPage();
      if (answers.siteType) loadProjectList(answers.siteType);
    })();
  </script>
</body>
</html>
